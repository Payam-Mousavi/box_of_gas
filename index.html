<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box of Gas — Maxwell's Demon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
  }
  h1 { font-size: 18px; margin-bottom: 8px; color: #a0c4ff; }
  .main { display: flex; gap: 16px; align-items: flex-start; }
  .sim-panel { display: flex; flex-direction: column; gap: 6px; width: 602px; flex-shrink: 0; align-self: stretch; }
  .side-panel { display: flex; flex-direction: column; gap: 6px; width: 302px; flex-shrink: 0; }
  canvas { border: 1px solid #334; border-radius: 4px; background: #0d0d1a; }
  #simCanvas { cursor: crosshair; }
  .controls {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    margin-bottom: 4px; width: 920px; min-height: 28px;
  }
  .controls label { font-size: 11px; color: #8899aa; }
  .controls input[type="range"] { width: 65px; vertical-align: middle; }
  .controls span.val {
    font-size: 11px; color: #a0c4ff; min-width: 28px; display: inline-block;
  }
  .controls select {
    background: #334; color: #a0c4ff; border: 1px solid #556;
    padding: 2px 4px; border-radius: 3px; font-family: inherit; font-size: 11px;
  }
  button {
    background: #334; color: #a0c4ff; border: 1px solid #556;
    padding: 3px 10px; border-radius: 3px; cursor: pointer;
    font-family: inherit; font-size: 11px;
  }
  button:hover { background: #445; }
  button:disabled { opacity: 0.4; cursor: default; }
  .stats {
    font-size: 11px; color: #8899aa; display: flex; gap: 10px; flex-wrap: wrap;
    height: 18px; overflow: hidden;
  }
  .stats .warn { color: #e76f51; }
  .stats .ok { color: #2a9d8f; }
  .panel-label {
    font-size: 10px; color: #667; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 1px;
  }
  .sweep-status {
    font-size: 11px; color: #e9c46a; margin-top: 4px; height: 16px; overflow: hidden;
  }
</style>
</head>
<body>

<h1>Box of Gas</h1>

<div class="controls">
  <label>N:
    <input type="range" id="sliderN" min="50" max="2000" value="500" step="50">
    <span class="val" id="valN">500</span>
  </label>
  <label>T:
    <input type="range" id="sliderT" min="0.1" max="5" value="1" step="0.1">
    <span class="val" id="valT">1.0</span>
  </label>
  <label>Radius:
    <input type="range" id="sliderR" min="0.2" max="1.5" value="0.5" step="0.1">
    <span class="val" id="valR">0.5</span>
  </label>
  <label>Door:
    <input type="range" id="sliderDoor" min="0" max="100" value="30" step="5">
    <span class="val" id="valDoor">30%</span>
  </label>
  <label>Demon:
    <select id="selectDemon">
      <option value="none">None</option>
      <!-- <option value="classical-fixed">Classical (fixed)</option> -->
      <option value="classical-adaptive">Classical (adaptive)</option>
      <option value="god">Optimal (god)</option>
      <option value="local">Local</option>
    </select>
  </label>
  <label id="labelLocalR" style="display:none;">r/L:
    <input type="range" id="sliderLocalR" min="0.02" max="1.0" value="0.1" step="0.02">
    <span class="val" id="valLocalR">0.10</span>
  </label>
  <button id="btnStartPause">Start</button>
  <button id="btnReset">Reset</button>
  <button id="btnSweep">r-Sweep</button>
  <button id="btnExport">Export CSV</button>
</div>

<div class="main">
  <div class="sim-panel">
    <canvas id="simCanvas" width="600" height="740"></canvas>
    <div class="stats">
      <span>T<sub>L</sub>: <span id="statTL">—</span></span>
      <span>T<sub>R</sub>: <span id="statTR">—</span></span>
      <span>N<sub>L</sub>: <span id="statNL">—</span></span>
      <span>N<sub>R</sub>: <span id="statNR">—</span></span>
      <span>&Delta;S/N: <span id="statDS">—</span></span>
      <span>Drift: <span id="statDrift">—</span></span>
      <span>Bits: <span id="statBits">—</span></span>
      <span>FPS: <span id="statFPS">—</span></span>
      <span>t: <span id="statTime">—</span></span>
      <span id="statSteady"></span>
    </div>
    <div class="sweep-status" id="sweepStatus"></div>
  </div>
  <div class="side-panel">
    <div>
      <div class="panel-label">Speed Distribution</div>
      <canvas id="histCanvas" width="300" height="160"></canvas>
    </div>
    <div>
      <div class="panel-label">&Delta;T Over Time</div>
      <canvas id="dtCanvas" width="300" height="120"></canvas>
    </div>
    <div>
      <div class="panel-label">&Delta;S Over Time</div>
      <canvas id="dsCanvas" width="300" height="120"></canvas>
    </div>
    <div>
      <div class="panel-label">r-Sweep: &Delta;T vs r/L</div>
      <canvas id="sweepCanvas" width="300" height="140"></canvas>
    </div>
    <div>
      <div class="panel-label">r-Sweep: Time to Steady State</div>
      <canvas id="timeCanvas" width="300" height="120"></canvas>
    </div>
  </div>
</div>

<script src="sim.js?v=3"></script>
<script src="policy.js?v=3"></script>
<script src="render.js?v=3"></script>
<script src="sweep.js?v=3"></script>
<script>
// ============================================================
// Controls
// ============================================================
function readParams() {
  return {
    N: parseInt(document.getElementById('sliderN').value),
    T: parseFloat(document.getElementById('sliderT').value),
    R: parseFloat(document.getElementById('sliderR').value),
    door: parseInt(document.getElementById('sliderDoor').value)/100,
    demon: document.getElementById('selectDemon').value,
    localR: parseFloat(document.getElementById('sliderLocalR').value),
  };
}

function updateSliderDisplays() {
  document.getElementById('valN').textContent = document.getElementById('sliderN').value;
  document.getElementById('valT').textContent = parseFloat(document.getElementById('sliderT').value).toFixed(1);
  document.getElementById('valR').textContent = parseFloat(document.getElementById('sliderR').value).toFixed(1);
  document.getElementById('valDoor').textContent = document.getElementById('sliderDoor').value+'%';
  document.getElementById('valLocalR').textContent = parseFloat(document.getElementById('sliderLocalR').value).toFixed(2);
  document.getElementById('labelLocalR').style.display =
    document.getElementById('selectDemon').value==='local' ? '' : 'none';
}

const controlElements = document.querySelectorAll('.controls input, .controls select');
controlElements.forEach(el => {
  const handleControlChange = () => {
    updateSliderDisplays();
    if (!running) initialized = false;
  };
  el.addEventListener('input', handleControlChange);
  if (el.tagName === 'SELECT') {
    el.addEventListener('change', handleControlChange);
  }
});

// ============================================================
// Main loop
// ============================================================
const STEPS_PER_FRAME = 5;
const SWEEP_STEADY_HOLD = 40;
const MIN_SWEEP_TIME_BASELINE = 400;
const MIN_SWEEP_TIME_LOCAL = 200;
let renderCounter = 0;
let initialized = false;

function loop() {
  if (!running) return;

  for (let s=0;s<STEPS_PER_FRAME;s++) step();

  renderSim();
  renderCounter++;
  if (renderCounter%10===0) {
    renderHistogram();
    renderTimeSeries(dtCtx, dtCanvas, dtHistory, 'ΔT', '#e9c46a', true);
    renderTimeSeries(dsCtx, dsCanvas, dsHistory, 'ΔS/N', '#2a9d8f', true);
    updateStats();
  }

  updateFPS();

  if (sweepRunning) {
    const SWEEP_MAX_TIME = 800;
    const phase = typeof sweepPhase !== 'undefined' ? sweepPhase : 'idle';
    const minTime = (phase === 'baseline-adaptive' || phase === 'baseline-god')
      ? MIN_SWEEP_TIME_BASELINE
      : MIN_SWEEP_TIME_LOCAL;
    const steadyHoldMet = isSteady && steadyTime !== null &&
      (simTime - steadyTime) >= SWEEP_STEADY_HOLD &&
      simTime >= minTime;
    if (steadyHoldMet || simTime >= SWEEP_MAX_TIME) {
      finishSweepStep();
      return;
    }
  }

  animId = requestAnimationFrame(loop);
}

// ============================================================
// Button handlers
// ============================================================
document.getElementById('btnStartPause').addEventListener('click', () => {
  if (running) {
    running = false;
    document.getElementById('btnStartPause').textContent = 'Resume';
    return;
  }
  if (!initialized) {
    const p = readParams();
    doorFraction=p.door; demonType=p.demon; localRadiusFrac=p.localR;
    init(p.N, p.T, p.R);
    initialized = true;
  }
  running = true;
  document.getElementById('btnStartPause').textContent = 'Pause';
  loop();
});

document.getElementById('btnReset').addEventListener('click', () => {
  running=false; sweepRunning=false;
  if (animId) cancelAnimationFrame(animId);
  document.getElementById('btnStartPause').textContent = 'Start';
  document.getElementById('btnStartPause').disabled = false;
  document.getElementById('btnSweep').disabled = false;
  const p = readParams();
  doorFraction=p.door; demonType=p.demon; localRadiusFrac=p.localR;
  init(p.N, p.T, p.R);
  initialized = true;
  renderSim(); renderHistogram();
  renderTimeSeries(dtCtx,dtCanvas,dtHistory,'ΔT','#e9c46a',true);
  renderTimeSeries(dsCtx,dsCanvas,dsHistory,'ΔS/N','#2a9d8f',true);
  updateStats();
  resetSweepData();
});

document.getElementById('btnSweep').addEventListener('click', startSweep);
document.getElementById('btnExport').addEventListener('click', exportCSV);

// ============================================================
// Initial render
// ============================================================
updateSliderDisplays();
{
  const p = readParams();
  doorFraction=p.door; demonType=p.demon; localRadiusFrac=p.localR;
  init(p.N, p.T, p.R);
  initialized = true;
  renderSim(); renderHistogram(); updateStats();
  resetSweepData();
}
</script>

</body>
</html>
